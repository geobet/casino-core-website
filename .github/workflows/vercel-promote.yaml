name: Promote to Vercel Production

# Promotes a Vercel deployment to production using a Vercel access token.
#
# Two modes:
#  1. workflow_dispatch  -> manually promote a specific (already-built) deployment URL/ID.
#  2. push to `main`     -> build a fresh production deployment and promote it.
#
# Required repository secrets:
#  - VERCEL_TOKEN       : Vercel access token (Account Settings -> Tokens)
#  - VERCEL_ORG_ID      : Vercel organization/team ID
#  - VERCEL_PROJECT_ID  : Vercel project ID

on:
  workflow_dispatch:
    inputs:
      deployment:
        description: "Existing deployment URL or ID to promote (leave empty to build a new one)"
        required: false
        type: string
  push:
    branches:
      - main

concurrency:
  group: vercel-promote-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  promote:
    name: Promote
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.result.outputs.url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Vercel token
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "::error::VERCEL_TOKEN secret is not set."
            exit 1
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"

      # ---- Mode 1: promote an existing deployment ----------------------------
      - name: Promote existing deployment
        id: promote_existing
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.deployment != '' }}
        run: |
          echo "Promoting existing deployment: ${{ inputs.deployment }}"
          vercel promote "${{ inputs.deployment }}" --token="${{ secrets.VERCEL_TOKEN }}"
          echo "url=${{ inputs.deployment }}" >> "$GITHUB_OUTPUT"

      # ---- Mode 2: build + deploy a new production release -------------------
      - name: Build production artifacts
        if: ${{ steps.promote_existing.outcome == 'skipped' }}
        run: vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy and promote to production
        id: deploy_new
        if: ${{ steps.promote_existing.outcome == 'skipped' }}
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}")
          echo "Deployed to: $DEPLOY_URL"
          vercel promote "$DEPLOY_URL" --token="${{ secrets.VERCEL_TOKEN }}"
          echo "url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"

      - name: Expose final URL
        id: result
        run: |
          URL="${{ steps.promote_existing.outputs.url || steps.deploy_new.outputs.url }}"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Production URL: $URL"

      - name: Summary
        run: |
          {
            echo "### Vercel promotion complete :rocket:"
            echo ""
            echo "- **Trigger:** ${{ github.event_name }}"
            echo "- **Production URL:** ${{ steps.result.outputs.url }}"
          } >> "$GITHUB_STEP_SUMMARY"
